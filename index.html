<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portfólio - João Pedro</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2.5rem;
    }
    
    p {
      margin-bottom: 30px;
      color: #94a3b8;
    }

    .container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      background: #334155;
    }

    a {
      text-decoration: none;
      color: white;
      display: block;
    }

    .btn {
      margin-top: 10px;
      padding: 10px;
      background: #3b82f6;
      border-radius: 5px;
    }

    .btn:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>

  <h1>João Pedro</h1>
  <p class="destaque">Desenvolvedor em formação | Portfólio</p>
  <p>Projetos em evolução contínua 🚀</p>

  <div class="container">

    <div class="card">
      <h3>Projeto 01</h3>
      <p>Página web simples com HTML e CSS</p>
      <a href="projeto-01/">
        <div class="btn">Ver Projeto</div>
      </a>
    </div>

    <div class="card">
      <h3>Projeto 02</h3>
      <p>Landing Page com design responsivo | HTML e CSS</p>
      <a href="projeto-02/">
        <div class="btn">Ver Projeto</div>
      </a>
    </div>

  </div>

</body>
</html>
